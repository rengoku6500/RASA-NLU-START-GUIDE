version: "3.1"

#QUESTION

#this script is just to create intent. intent is a set of question made by user
#If another question has the same objective or goal, you can bundle it together on the same intent.

# Even if user said Hi or Hiiiiii or HiiIIIii  the BOTS can still recongnizes patterns(using machine learning) "Hii"
# as long as you give enough training data. so user don't need to put exactly "Hii" to get the greet response.


 # [pagi] is the entity values and (greeting_time) is the entity name it helps
 # the bots knows the "lookup greeting_time" is the same with the entity "greeting_time" 
 # entity value is like a set of words to trigger custom actions
 
 
 
 #when creating examples keep in mind. what you want to teach is pattern not exact human words.


nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hello there
    - good morning
    - good evening
    - moin
    - hey there
    - let's go
    - hey dude
    - goodmorning
    - goodevening
    - good afternoon
    
    
- intent: malaysia
  examples: |
    - selamat pagi nenek tua
    - selamat petang
    - selamat tengahari
    

- intent: goodbye
  examples: |
    - cu
    - good by
    - cee you later
    - good night
    - bye
    - goodbye
    - have a nice day
    - see you around
    - bye bye
    - see you later

- intent: affirm
  examples: |
    - yes
    - y
    - indeed
    - of course
    - that sounds good
    - correct

- intent: deny
  examples: |
    - no
    - n
    - never
    - I don't think so
    - don't like that
    - no way
    - not really

- intent: mood_great
  examples: |
    - perfect
    - great
    - amazing
    - feeling like a king
    - wonderful
    - I am feeling very good
    - I am great
    - I am amazing
    - I am going to save the world
    - super stoked
    - extremely good
    - so so perfect
    - so good
    - so perfect

- intent: mood_unhappy
  examples: |
    - my day was horrible
    - I am sad
    - I don't feel very well
    - I am disappointed
    - super sad
    - I'm so sad
    - sad
    - very sad
    - unhappy
    - not good
    - not very good
    - extremly sad
    - so saad
    - so sad

- intent: bot_challenge
  examples: |
    - are you a bot?
    - are you a human?
    - am I talking to a bot?
    - am I talking to a human?
